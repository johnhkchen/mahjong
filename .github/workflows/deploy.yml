# P3 — deploy is nobody's job: push to green main → tests → live at mahjong.b28.dev.
# The deploy step is gated on the CLOUDFLARE_API_TOKEN secret so CI stays a green
# test gate until the token is added, then flips to deploying automatically.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time, in push order; never cancel a deploy mid-flight.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  ship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned to the flox toolchain (.flox/env/manifest.toml)
          node-version: '24.16.0'
          cache: npm

      - run: npm ci

      - name: check (svelte-check + tsc)
        run: npm run check

      - name: test (vitest — engine properties + view)
        run: npm test

      - name: build (single self-contained dist/index.html + gate)
        run: npm run build

      - name: deploy to Cloudflare (mahjong.b28.dev)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN secret not set — skipping deploy (CI ran as a test gate)."
            exit 0
          fi
          npx wrangler deploy
